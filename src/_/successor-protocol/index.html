    ============================================================
    THE SUCCESSOR PROTOCOL — gated stub
    ============================================================
    Hidden route: /_/successor-protocol/
    Underscored-prefix is the wuld.ink internal convention for
    "not indexed, not linked, not surfaced anywhere on the site."

    AUTHORIZATION (operator-side, post-session):
      Configure at: Cloudflare Zero Trust dashboard →
        Access → Applications → Add an application →
        Self-hosted application
      Application domain: wuld.ink/_/successor-protocol/*
      Identity providers: One-time PIN (email-OTP)
      Policy: Allow → Emails include → alisendjsc@gmail.com
      Session duration: 24 hours (or operator preference)

    Cloudflare Access gates the request at the edge BEFORE the
    HTML is served. View-source / dev-tools bypass is impossible
    because the bytes never leave the edge until JWT is validated.
    Client-side JS password schemes (defeated by view-source) are
    categorically NOT used here.

    CONTENT (chat-side, post-baton):
      Replace the <main> stub block below with the actual
      Successor Protocol content when the baton arrives from the
      authoring project. No Cowork session needed for the swap.

    No nav, no site-header, no footer — this is a sealed surface,
    deliberately untethered from the umbrella's chrome. If you
    landed here unauthenticated, something is wrong with Access.
    ============================================================
  -->
