    /* 404 page (session K8, 2026-05-14). Per book-Claude P4
       response (handout-priorities 2026-05-13): "The cat is on the
       table." is the book body's closing gesture. The /404/ slot is
       the architecturally-fit deployment for the line because both
       /404/ and the book's closing line are structurally exit-line
       moments. Treatment per book-Claude: roman, body-size,
       flush-left, vertically high on the page. No "404 - Page Not
       Found" boilerplate above the line; technical status placed
       small + below at footer scale. The line does the work alone. */
    .not-found {
      max-width: var(--w-prose);
      margin-inline: auto;
      padding-inline: var(--s-5);
      padding-block: var(--s-7) var(--s-10);

      font-size: var(--t-md);
      color: var(--c-fg);
      margin-block-end: 0;
    }
    .not-found-status {
      font-family: var(--font-mono);
      font-size: var(--t-xs);
      text-transform: uppercase;
      letter-spacing: var(--ls-mega);
      color: var(--c-fg-muted);
      margin-block-start: var(--s-10);
      margin-block-end: var(--s-2);
    }
    .not-found-return {
      font-family: var(--font-mono);
      font-size: var(--t-xs);
      color: var(--c-fg-muted);
      margin-block-start: 0;
    }
    .not-found-return a {
      color: var(--c-fg);
      text-decoration: none;
      border-bottom: var(--bw-base) solid var(--c-accent);
    }
    .not-found-return a:hover { color: var(--c-accent); }
  </style>
